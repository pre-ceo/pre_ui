<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://127.0.0.1:19500; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
<title>pre · usage</title>
<link rel="stylesheet" href="shared/theme.css">
<link rel="stylesheet" href="css/usage.css">
</head>
<body>
<div id="appbar-host"></div>

<div class="term-page">
  <div class="cli-row">
    <span class="pa">❯</span><span class="pt">pre usage</span><span class="m">--node=</span><span class="b" id="usage-node-label">local</span>
    <span class="grow"></span>
    <span class="m" id="probed-ts" style="font-size:11px;">probed: -</span>
  </div>
  <div id="node-tabs"></div>
  <div id="usage-list" class="usage-list">
    <div class="dim p-12">loading...</div>
  </div>
  <pre class="term-hints"><span class="sh"># hints</span>
  <span class="m">·</span> master 每 10min 周期抓 (cli 内置 /usage|/quota|/status, 0 LLM token 消耗)
  <span class="m">·</span> 点击 <span class="m">raw_excerpt</span> 行展开看完整 cli 输出 (含 ANSI / box drawing)</pre>
</div>

<script src="shared/vendor/dompurify.min.js"
        integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu"
        crossorigin="anonymous"></script>
<script src="shared/utils.js"></script>
<script src="shared/fetch.js"></script>
<script src="shared/components.js"></script>
<script src="js/usage.js"></script>
</body>
</html>
