<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://127.0.0.1:19500; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
<title>pre · usage</title>
<link rel="stylesheet" href="shared/theme.css">
<link rel="stylesheet" href="css/usage.css">
</head>
<body>
<div id="appbar-host"></div>

<div class="usage-wrap">
  <div class="card">
    <h2>LLM cli usage <span id="probed-ts" class="dim" style="font-weight:normal;font-size:11px;">probed: -</span></h2>
    <div id="node-tabs" class="node-tabs"></div>
    <div id="usage-list" class="usage-list">
      <div class="dim p-12">loading...</div>
    </div>
    <div class="dim" style="font-size:10px;margin-top:10px;">
      master 每 10min 周期抓一次 (cli 内置 /usage|/quota|/status 命令, 0 LLM token 消耗).
      点击 raw 行展开看完整原始输出 (含 ANSI / box drawing).
    </div>
  </div>
</div>

<script src="shared/vendor/dompurify.min.js"
        integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu"
        crossorigin="anonymous"></script>
<script src="shared/utils.js"></script>
<script src="shared/fetch.js"></script>
<script src="shared/components.js"></script>
<script src="js/usage.js"></script>
</body>
</html>
