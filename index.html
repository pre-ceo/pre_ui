<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://127.0.0.1:19500; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
<title>pre · CEO</title>
<link rel="stylesheet" href="shared/theme.css">
<link rel="stylesheet" href="css/agents.css">
<link rel="stylesheet" href="css/chat.css">
<link rel="stylesheet" href="css/dispatches.css">

<link rel="stylesheet" href="css/settings.css">

</head>
<body>
<!-- SPA shell: 扁平 IDE 风 — header.appbar + nav.tab-bar + main#app-content.
     不再用 macOS-style window 外壳 (圆角/阴影/流量灯), 已脱钩任何桌面 OS 视觉范式. -->
<header class="appbar">
  <span class="brand">pre · CEO</span>
  <span class="ctx" id="appbar-title">agents</span>
  <span class="grow"></span>
  <span id="appbar-token" class="ts">token: -</span>
  <span id="appbar-health" class="health">master ?</span>
  <span id="appbar-clock" class="ts"></span>
</header>
<nav class="tab-bar" id="tab-bar">
  <a href="#agents"        class="tab active" data-route="agents">agents</a>
  <a href="#usage"         class="tab"        data-route="usage">usage</a>
  <a href="#settings"      class="tab"        data-route="settings">settings</a>
  <!-- 暂时隐藏 (恢复: 取消注释 + 同步 shared/router.js TABS / DEFAULT)
  <a href="#home"          class="tab"        data-route="home">home</a>
  <a href="#tasks"         class="tab"        data-route="tasks">tasks</a>
  <a href="#dispatches"    class="tab"        data-route="dispatches">dispatches</a>
  <a href="#notifications" class="tab"        data-route="notifications">notifications</a>
  -->
</nav>
<main id="app-content" class="terminal-body"></main>

<script src="shared/vendor/dompurify.min.js"
        integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu"

        crossorigin="anonymous"></script>
<script src="shared/utils.js"></script>
<script src="shared/fetch.js"></script>
<script src="shared/components.js"></script>
<script src="js/chat.js"></script>
<script src="js/index.js"></script>
<script src="js/agents.js"></script>
<script src="js/tasks.js"></script>
<script src="js/dispatches.js"></script>
<script src="js/usage.js"></script>
<script src="js/notifications.js"></script>
<script src="js/settings.js"></script>

<script src="shared/router.js"></script>
</body>
</html>
